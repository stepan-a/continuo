# GitHub Actions — unit tests + coverage.
#
# This is the SECONDARY CI. The primary pipeline (lint -> test -> docs ->
# deploy, including the Sphinx manual and the Beamer PDFs) lives in
# .gitlab-ci.yml on the project's own GitLab server. This workflow only
# runs the test suite and publishes a coverage badge.
#
# Coverage is self-contained: no external service. py-cov-action computes
# the coverage, generates the badge + HTML report, and stores them on the
# `python-coverage-comment-action-data` branch of this repo (using the
# built-in GITHUB_TOKEN). The README badge points at that branch.

name: tests

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write        # push the badge/report to the data branch
  pull-requests: write   # post the coverage comment on PRs

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install SuiteSparse (libklu.so for the KLU backend)
        run: sudo apt-get update && sudo apt-get install -y libsuitesparse-dev

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: pytest -q --cov=continuo --cov-report=term-missing

      - name: Coverage badge & report (self-contained, no external service)
        id: coverage
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Store coverage PR comment
        uses: actions/upload-artifact@v4
        if: steps.coverage.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt
