# GitHub Actions — build and publish a release on every version tag.
#
# Triggered by pushing a tag like `v0.0.2`. continuo is a pure-Python
# package, so `python -m build` produces a single universal wheel
# (`*-py3-none-any.whl`) plus an sdist (`*.tar.gz`); both are attached to
# a GitHub Release named after the tag. Users install with either:
#
#     pip install https://github.com/stepan-a/continuo/releases/download/vX.Y.Z/continuo-X.Y.Z-py3-none-any.whl
#
# or by downloading the asset. The KLU backend's system library
# (libsuitesparse) is NOT bundled — it stays optional, with a graceful
# fallback to SuperLU (see doc/manual/solvers.rst).
#
# To cut a release: bump the version (scripts/bump-version.py), commit,
# then `git tag -a vX.Y.Z -m 'vX.Y.Z' && git push --tags`.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow a manual run (builds, but only releases on a tag)

permissions:
  contents: write # create the release and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: continuo-dist
          path: dist/*

      - name: Create GitHub Release with the artifacts
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
