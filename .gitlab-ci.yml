# GitLab CI for continuo.
#
# Designed for a shell-executor runner (no Docker) on Debian stable
# with Python 3.13 available as `python3.13`. Each job creates a
# workspace-local venv, installs dependencies into it, and runs the
# job inside it — keeping pipelines isolated from the system Python
# and from other repos on the same runner.
#
# To restrict jobs to a particular runner, add a `tags:` list to each
# job (or to the `default:` block) matching tags configured on the
# GitLab runner.

default:
  before_script:
    - python3.13 -m venv .venv-ci
    - source .venv-ci/bin/activate
    - python -m pip install --quiet --upgrade pip

stages:
  - lint
  - test
  - docs
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONDONTWRITEBYTECODE: "1"

cache:
  key:
    files:
      - pyproject.toml
  paths:
    - .cache/pip

# ---------------------------------------------------------------------------
# Lint stage — fast, no heavy dependencies.
# ---------------------------------------------------------------------------

lint:
  stage: lint
  only:
    - master@stepan/continuo
  script:
    - pip install --quiet ruff
    - ruff check src tests
    - ruff format --check src tests
  tags:
    - stepan@puck


# ---------------------------------------------------------------------------
# Test stage — install the package with dev extras and run pytest.
# ---------------------------------------------------------------------------

test:
  stage: test
  only:
    - master@stepan/continuo
  # CI must exercise the KLU backend, so the runner host (puck) carries
  # libsuitesparse-dev (which provides libklu.so). The guard below fails the
  # pipeline loudly if the library ever goes missing, rather than letting the
  # klu cross-checks silently skip. (The GitHub mirror installs the same
  # library with apt — see .github/workflows/tests.yml.)
  script:
    - pip install --quiet -e ".[dev]"
    - python -c "from continuo.solve import available_solvers; assert 'klu' in available_solvers(), 'libklu.so missing on the runner; install libsuitesparse-dev'"
    - pytest -q --tb=short
  tags:
    - stepan@puck


# ---------------------------------------------------------------------------
# Docs stage — build the Sphinx reference manual with warnings-as-errors.
# The HTML output is published as an artifact so the deploy job can pick
# it up directly.
# ---------------------------------------------------------------------------

docs:
  stage: docs
  only:
    - master@stepan/continuo
  script:
    - pip install --quiet -e ".[docs]"
    - sphinx-build -W --keep-going -b html doc/manual doc/manual/_build/html
  artifacts:
    paths:
      - doc/manual/_build/html
    expire_in: 1 week
  tags:
    - stepan@puck


# ---------------------------------------------------------------------------
# Deploy stage — rsync the built manual to the production directory on
# the same host (the runner is shell-executor on puck). `--delete` keeps
# the destination an exact mirror of the build, so renamed/removed pages
# disappear. `--exclude=/pdf/` protects the sibling pdf/ directory (the
# nk-nonlinear derivations PDF deployed by deploy_pdf): without it, every
# docs deploy mirrors the manual over the web root and wipes pdf/ — the
# bug that made https://continuo.adjemian.eu/pdf/nk-nonlinear.pdf vanish.
# ---------------------------------------------------------------------------

deploy_docs:
  stage: deploy
  only:
    - master@stepan/continuo
  needs:
    - docs
  before_script: []      # no Python venv needed; the job just rsyncs
  script:
    - mkdir -p /puck/www/continuo.adjemian.eu
    - rsync -av --delete --exclude='/pdf/' doc/manual/_build/html/ /puck/www/continuo.adjemian.eu/
  tags:
    - stepan@puck


# ---------------------------------------------------------------------------
# Docs stage — compile the Beamer derivations companion for
# examples/nk-nonlinear/ with rubber. TeXLive + rubber are assumed to be on
# the runner host. `--clean` removes the auxiliary files after a successful
# build so only the .pdf is left in the workspace, which is then published
# as an artifact for the deploy stage.
#
# The `only.changes` clause skips the job entirely when the .tex source has
# not been touched by the push, so casual commits to other parts of the repo
# don't trigger an unnecessary rebuild + redeploy. The currently-deployed
# PDF on the web server stays untouched in that case. To force a rebuild
# without a real .tex edit, touch the file (`touch examples/nk-nonlinear/derivations.tex`)
# or trigger the pipeline manually from the GitLab UI after pushing a
# trivial whitespace change.
# ---------------------------------------------------------------------------

nk-nonlinear-pdf:
  stage: docs
  only:
    refs:
      - master@stepan/continuo
    changes:
      - examples/nk-nonlinear/derivations.tex
  before_script: []      # no Python venv needed; rubber is system-wide
  script:
    # `rubber --pdf --clean` compiles the document and then removes
    # *all* outputs (PDF included), which would leave the artifact path
    # empty. Build without `--clean` and let the ephemeral CI workspace
    # handle cleanup. Only the .pdf is published as an artifact.
    - cd examples/nk-nonlinear
    - rubber --shell-escape --pdf derivations.tex
  artifacts:
    paths:
      - examples/nk-nonlinear/derivations.pdf
    expire_in: 1 week
  tags:
    - stepan@puck


# ---------------------------------------------------------------------------
# Deploy stage — publish the compiled derivations PDF at
# https://continuo.adjemian.eu/pdf/nk-nonlinear.pdf. The README links to
# this URL, so the PDF tracks master automatically. Same `only.changes`
# filter as the build job: deploy runs iff the .tex has actually changed.
# ---------------------------------------------------------------------------

deploy_pdf:
  stage: deploy
  only:
    refs:
      - master@stepan/continuo
    changes:
      - examples/nk-nonlinear/derivations.tex
  needs:
    - nk-nonlinear-pdf
  before_script: []
  script:
    - mkdir -p /puck/www/continuo.adjemian.eu/pdf
    - rsync -av examples/nk-nonlinear/derivations.pdf /puck/www/continuo.adjemian.eu/pdf/nk-nonlinear.pdf
  tags:
    - stepan@puck


# ---------------------------------------------------------------------------
# Docs stage — compile the perfect-foresight Beamer slides with rubber.
# `--shell-escape` is required: the preamble runs `\write18{git rev-parse
# HEAD > git.hash}` to stamp the footer revision, and git.hash is gitignored
# (absent from a fresh checkout). Same `only.changes` gating as the
# nk-nonlinear PDF: rebuild only when the .tex source is touched.
# ---------------------------------------------------------------------------

slides-pdf:
  stage: docs
  only:
    refs:
      - master@stepan/continuo
    changes:
      - doc/perfect-foresight/slides.tex
  before_script: []      # no Python venv needed; rubber is system-wide
  script:
    - cd doc/perfect-foresight
    - rubber --shell-escape --pdf slides
  artifacts:
    paths:
      - doc/perfect-foresight/slides.pdf
    expire_in: 1 week
  tags:
    - stepan@puck


# ---------------------------------------------------------------------------
# Deploy stage — publish the slides at
# https://continuo.adjemian.eu/pdf/perfect-foresight.pdf (renamed from the
# generic slides.pdf). Lives in the same pdf/ folder as nk-nonlinear.pdf,
# protected from the docs deploy's --delete by the --exclude=/pdf/ above.
# ---------------------------------------------------------------------------

deploy_slides:
  stage: deploy
  only:
    refs:
      - master@stepan/continuo
    changes:
      - doc/perfect-foresight/slides.tex
  needs:
    - slides-pdf
  before_script: []
  script:
    - mkdir -p /puck/www/continuo.adjemian.eu/pdf
    - rsync -av doc/perfect-foresight/slides.pdf /puck/www/continuo.adjemian.eu/pdf/perfect-foresight.pdf
  tags:
    - stepan@puck
